version: "3.9"

# ══════════════════════════════════════════════════════════════
#  Mustikatama ERP — On-Premise Stack
#  Usage:
#    First time:  docker compose up -d && docker compose exec api npm run migrate
#    Normal:      docker compose up -d
#    Stop:        docker compose down
#    Logs:        docker compose logs -f
# ══════════════════════════════════════════════════════════════

services:

  # ── PostgreSQL (local, primary database) ────────────────────
  db:
    image: postgres:16-alpine
    container_name: erp_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-erp}
      POSTGRES_USER:     ${DB_USER:-erp}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./supabase/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./supabase/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
    ports:
      - "5432:5432"   # expose for DBeaver / pgAdmin on LAN (optional)
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U ${DB_USER:-erp}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Node.js API server ───────────────────────────────────────
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: erp_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV:       production
      PORT:           3001
      DB_HOST:        db
      DB_PORT:        5432
      DB_NAME:        ${DB_NAME:-erp}
      DB_USER:        ${DB_USER:-erp}
      DB_PASSWORD:    ${DB_PASSWORD:-changeme}
      JWT_SECRET:     ${JWT_SECRET:-change_this_secret_in_production}
      # Supabase Cloud (for sync only — leave blank to disable sync)
      SUPABASE_URL:   ${SUPABASE_URL:-}
      SUPABASE_KEY:   ${SUPABASE_KEY:-}
      SYNC_INTERVAL:  ${SYNC_INTERVAL:-300}   # seconds between sync attempts
    volumes:
      - api_logs:/app/logs
    healthcheck:
      test: ["CMD","wget","-qO-","http://localhost:3001/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── React app (Nginx static server) ─────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: erp_app
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${APP_PORT:-80}:80"

  # ── Sync daemon (optional, only runs when SUPABASE_URL is set) ──
  sync:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: erp_sync
    restart: unless-stopped
    command: node sync/daemon.js
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST:       db
      DB_PORT:       5432
      DB_NAME:       ${DB_NAME:-erp}
      DB_USER:       ${DB_USER:-erp}
      DB_PASSWORD:   ${DB_PASSWORD:-changeme}
      SUPABASE_URL:  ${SUPABASE_URL:-}
      SUPABASE_KEY:  ${SUPABASE_KEY:-}
      SYNC_INTERVAL: ${SYNC_INTERVAL:-300}
    profiles:
      - sync   # only starts with: docker compose --profile sync up -d

volumes:
  db_data:
  api_logs:
